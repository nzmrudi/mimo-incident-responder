<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiMo Incident Responder — AI-Powered SRE Copilot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>"/>
<style>
:root{
  --bg:#0d100a;--panel:#161a12;--panel2:#1f2418;--border:#2e3525;
  --text:#e8f0d8;--muted:#8a9472;
  --accent:#84cc16;--accent2:#65a30d;
  --crit:#dc2626;--high:#f59e0b;--med:#eab308;--low:#0ea5e9;--info:#22c55e;
  --grad:linear-gradient(135deg,#84cc16 0%,#65a30d 50%,#16a34a 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono','Menlo','Inter',system-ui,monospace;background:#0d100a;color:var(--text);min-height:100vh;background-image:
  linear-gradient(180deg,#0d100a 0%,#080a06 100%),
  repeating-linear-gradient(0deg,transparent,transparent 2px,#84cc1606 2px,#84cc1606 3px);
  background-blend-mode:normal,overlay}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 25% 0%,#84cc1622,transparent 50%),radial-gradient(circle at 75% 100%,#16a34a22,transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:1280px;margin:0 auto;padding:24px;position:relative;z-index:1}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:var(--grad);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px #84cc1655;font-family:monospace}
.logo h1{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.logo p{font-size:11px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#22c55e22;border:1px solid #22c55e44;border-radius:4px;font-size:12px;color:var(--info);font-family:monospace}
.dot{width:6px;height:6px;background:var(--info);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;border-left:3px solid var(--accent)}
.kpi-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:monospace}
.kpi-v{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi.crit{border-left-color:var(--crit)}.kpi.crit .kpi-v{color:var(--crit)}
.kpi.high{border-left-color:var(--high)}.kpi.high .kpi-v{color:var(--high)}
.kpi.med .kpi-v{color:var(--med)}
.kpi.low .kpi-v{color:var(--low)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:22px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent)44,transparent)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace}
.card-title .ai-tag{font-size:10px;padding:3px 8px;background:var(--grad);color:#000;border-radius:3px;font-weight:700;letter-spacing:.5px}

textarea{width:100%;height:200px;padding:14px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono','Menlo',monospace;font-size:13px;resize:vertical;outline:none;transition:.2s}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)33}
.input{width:100%;padding:10px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.input:focus{border-color:var(--accent)}
.btn{padding:12px 22px;background:var(--grad);border:0;border-radius:4px;color:#000;font-weight:700;cursor:pointer;transition:.2s;font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px #84cc1666}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:12px}
.sample-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-left:auto;font-family:monospace}

.result-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;background:var(--panel2);border:1px dashed var(--border);border-radius:4px;font-family:monospace}

.severity-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:3px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:monospace}
.sev-critical{background:#dc262622;color:var(--crit);border:1px solid #dc262666}
.sev-high{background:#f59e0b22;color:var(--high);border:1px solid #f59e0b66}
.sev-medium{background:#eab30822;color:var(--med);border:1px solid #eab30866}
.sev-low{background:#0ea5e922;color:var(--low);border:1px solid #0ea5e966}
.sev-info{background:#22c55e22;color:var(--info);border:1px solid #22c55e66}

.report{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:18px;margin-top:14px;border-left:3px solid var(--accent)}
.report-row{margin-bottom:14px}
.report-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:monospace}
.report-text{font-size:14px;line-height:1.6;color:#cbd5b1;font-family:'Inter',sans-serif}
.report ol{padding-left:22px}
.report ol li{margin:4px 0;font-size:14px;color:#cbd5b1;line-height:1.5;font-family:'Inter',sans-serif}
.snippet{background:#000;border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px;white-space:pre-wrap;color:#bef264;margin-top:6px}

.history-list{max-height:600px;overflow-y:auto}
.history-list::-webkit-scrollbar{width:6px}
.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.h-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:4px;cursor:pointer;transition:.15s;border:1px solid transparent}
.h-item:hover{background:var(--panel2);border-color:var(--border)}
.h-time{font-size:11px;color:var(--muted);font-family:monospace;flex-shrink:0;width:80px}
.h-summary{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">🚨</div>
      <div>
        <h1>MiMo Incident Responder</h1>
        <p>AI-powered SRE copilot · Powered by <strong>Xiaomi MiMo</strong></p>
      </div>
    </div>
    <div class="badge"><span class="dot"></span><span id="status">Ready</span></div>
  </header>

  <!-- Stats -->
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-l">Total Incidents</div><div class="kpi-v" id="kTotal">0</div></div>
    <div class="kpi crit"><div class="kpi-l">Critical</div><div class="kpi-v" id="kCrit">0</div></div>
    <div class="kpi high"><div class="kpi-l">High</div><div class="kpi-v" id="kHigh">0</div></div>
    <div class="kpi med"><div class="kpi-l">Medium</div><div class="kpi-v" id="kMed">0</div></div>
    <div class="kpi low"><div class="kpi-l">Low / Info</div><div class="kpi-v" id="kLow">0</div></div>
  </div>

  <div class="grid-2">
    <!-- Analyzer -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">🔬 Analyze a Log <span class="ai-tag">MiMo</span></div>
      </div>
      <input class="input" id="hint" placeholder="Optional hint (e.g. 'happens during deploy')" />
      <textarea id="logIn" placeholder="Paste error log, stack trace, or journalctl output here…"></textarea>
      <div class="btn-row">
        <button class="btn" id="btnAnalyze">Analyze with MiMo</button>
        <span class="sample-link" id="loadSample">load sample log</span>
      </div>
      <div id="result" style="margin-top:14px"></div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">📜 Incident History</div>
        <button class="sample-link" id="refreshH" style="background:none;border:0;color:var(--gold)">↻ refresh</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="result-empty">No incidents yet — analyze a log to start</div>
      </div>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;

const SAMPLE = `[2026-05-22 14:32:11] ERROR worker.py:204 - psycopg2.OperationalError: FATAL: remaining connection slots are reserved for non-replication superuser connections
[2026-05-22 14:32:11] ERROR pool.py:88 - Failed to acquire connection after 30s timeout (pool exhausted: 0 free / 100 total)
[2026-05-22 14:32:12] WARNING gunicorn[1234]: Worker timeout (pid:5678)
[2026-05-22 14:32:12] CRITICAL gunicorn[1234]: Worker (pid:5678) was sent SIGKILL! Perhaps out of memory?
[2026-05-22 14:32:13] ERROR django.request - Internal Server Error: /api/orders/
Traceback (most recent call last):
  File "django/db/backends/utils.py", line 87, in _execute
    return self.cursor.execute(sql, params)
psycopg2.OperationalError: server closed the connection unexpectedly`;

async function loadStats(){
  try{
    const d = await (await fetch(API+'/api/stats')).json();
    kTotal.textContent = d.total;
    kCrit.textContent = d.by_severity.critical || 0;
    kHigh.textContent = d.by_severity.high || 0;
    kMed.textContent = d.by_severity.medium || 0;
    kLow.textContent = (d.by_severity.low||0)+(d.by_severity.info||0);
  }catch(e){console.error(e)}
}

async function loadHistory(){
  try{
    const d = await (await fetch(API+'/api/history?limit=30')).json();
    const list = document.getElementById('historyList');
    if(!d.items.length){
      list.innerHTML='<div class="result-empty">No incidents yet — analyze a log to start</div>';
      return;
    }
    list.innerHTML='';
    d.items.forEach(it=>{
      const el=document.createElement('div');
      el.className='h-item';
      const t=new Date(it.ts).toLocaleTimeString();
      el.innerHTML=`<span class="severity-badge sev-${it.severity}">${it.severity}</span>
        <span class="h-time">${t}</span>
        <span class="h-summary">${it.summary||'-'}</span>`;
      el.onclick=()=>showIncident(it.id);
      list.appendChild(el);
    });
  }catch(e){console.error(e)}
}

async function showIncident(id){
  try{
    const d = await (await fetch(API+'/api/incident/'+encodeURIComponent(id))).json();
    document.getElementById('logIn').value = d.log_preview || '';
    renderResult(d.result);
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){console.error(e)}
}

function renderResult(r){
  const sev = r.severity || 'info';
  let html = `
    <div class="report">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span class="severity-badge sev-${sev}">${sev}</span>
        <span style="color:var(--muted);font-size:12px">${r.category||'-'}</span>
        <span style="color:var(--muted);font-size:12px;margin-left:auto">confidence ${Math.round((r.confidence||0)*100)}%</span>
      </div>
      <div class="report-row">
        <div class="report-label">Summary</div>
        <div class="report-text"><strong>${escapeHtml(r.summary||'-')}</strong></div>
      </div>
      <div class="report-row">
        <div class="report-label">Root Cause</div>
        <div class="report-text">${escapeHtml(r.root_cause||'-')}</div>
      </div>
      <div class="report-row">
        <div class="report-label">Fix Steps</div>
        <ol>${(r.fix_steps||[]).map(s=>'<li>'+escapeHtml(s)+'</li>').join('')}</ol>
      </div>`;
  if(r.remediation_snippet){
    html += `<div class="report-row">
      <div class="report-label">Remediation Snippet</div>
      <div class="snippet">${escapeHtml(r.remediation_snippet)}</div>
    </div>`;
  }
  html += `<div class="report-row" style="margin-bottom:0">
      <div class="report-label">Prevention</div>
      <div class="report-text">${escapeHtml(r.prevention||'-')}</div>
    </div>
  </div>`;
  document.getElementById('result').innerHTML = html;
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}

document.getElementById('loadSample').onclick=()=>{
  document.getElementById('logIn').value=SAMPLE;
};

document.getElementById('refreshH').onclick=()=>{loadStats();loadHistory();};

document.getElementById('btnAnalyze').onclick=async()=>{
  const log = document.getElementById('logIn').value.trim();
  const hint = document.getElementById('hint').value.trim();
  if(!log){alert('Paste a log first');return;}
  const btn = document.getElementById('btnAnalyze');
  btn.disabled=true; btn.textContent='Analyzing…';
  document.getElementById('result').innerHTML = '<div class="result-empty"><span class="spinner"></span>&nbsp;&nbsp;MiMo is reasoning…</div>';
  try{
    const r = await fetch(API+'/api/analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({log,hint:hint||null})
    });
    if(!r.ok){throw new Error('HTTP '+r.status)}
    const d = await r.json();
    renderResult(d.result);
    loadStats(); loadHistory();
  }catch(e){
    document.getElementById('result').innerHTML='<div class="result-empty" style="color:var(--crit)">Error: '+e.message+'</div>';
  }finally{
    btn.disabled=false; btn.textContent='Analyze with MiMo';
  }
};

loadStats(); loadHistory();
setInterval(()=>{loadStats();loadHistory();}, 30000);
</script>
</body>
</html>
